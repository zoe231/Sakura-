<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Job Finder 🌸</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-pink-50">

    <!-- Sakura Petals -->
    <div id="petals"></div>

    <!-- Welcome Screen -->
    <section id="welcome-screen" class="fixed inset-0 flex items-center justify-center z-50">
        <div class="glass max-w-md w-full p-8 text-center rounded-3xl">
            <div class="text-6xl mb-4">🌸</div>

            <h1 class="text-4xl font-bold mb-2">
                Sakura Job Finder
            </h1>

            <p class="text-gray-700 mb-6">
                Let your skills bloom.
            </p>

            <input
                id="nameInput"
                type="text"
                placeholder="Who are you?"
                class="w-full p-3 rounded-xl border mb-4"
            >

            <button
                id="enterBtn"
                class="w-full bg-pink-500 text-white py-3 rounded-xl hover:scale-105 transition"
            >
                Enter
            </button>
        </div>
    </section>

    <!-- Main App -->
    <div id="app" class="hidden">

        <!-- Header -->
        <header class="p-6">
            <div class="glass rounded-3xl p-5 flex justify-between items-center">

                <div>
                    <h1 class="text-3xl font-bold">
                        🌸 Sakura Job Finder
                    </h1>

                    <p class="text-gray-700">
                        Welcome,
                        <span id="username"></span>
                    </p>
                </div>

                <button
                    id="logoutBtn"
                    class="bg-white/70 px-4 py-2 rounded-xl"
                >
                    Logout
                </button>

            </div>
        </header>

        <main class="px-6 pb-10">

            <div class="grid lg:grid-cols-[300px_1fr] gap-6">

                <!-- Sidebar -->
                <aside>

                    <div class="glass rounded-3xl p-5 sticky top-6">

                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-bold text-xl">
                                Recent Searches
                            </h2>

                            <button
                                id="clearHistoryBtn"
                                class="text-sm text-red-500"
                            >
                                Clear
                            </button>
                        </div>

                        <div
                            id="historyContainer"
                            class="space-y-3"
                        ></div>

                    </div>

                </aside>

                <!-- Content -->
                <section>

                    <!-- Search Card -->
                    <div class="glass rounded-3xl p-6">

                        <h2 class="text-2xl font-bold mb-6">
                            Search Opportunities
                        </h2>

                        <!-- Skills -->
                        <div class="mb-6">

                            <label class="block font-semibold mb-2">
                                Skills
                            </label>

                            <div class="flex gap-2">

                                <input
                                    id="skillInput"
                                    type="text"
                                    placeholder="Python"
                                    class="flex-1 p-3 rounded-xl border"
                                >

                                <button
                                    id="addSkillBtn"
                                    class="bg-pink-500 text-white px-4 rounded-xl"
                                >
                                    Add
                                </button>

                            </div>

                            <div
                                id="skillsContainer"
                                class="flex flex-wrap gap-2 mt-3"
                            ></div>

                        </div>

                        <!-- Position -->
                        <div class="mb-6">

                            <label class="block font-semibold mb-2">
                                Position
                            </label>

                            <input
                                id="positionInput"
                                type="text"
                                value="AI Engineer"
                                class="w-full p-3 rounded-xl border"
                            >

                        </div>

                        <!-- Location -->
                        <div class="mb-6">

                            <label class="block font-semibold mb-2">
                                Location
                            </label>

                            <input
                                id="locationInput"
                                type="text"
                                value="Remote"
                                class="w-full p-3 rounded-xl border"
                            >

                        </div>

                        <!-- Type -->
                        <div class="mb-6">

                            <label class="block font-semibold mb-2">
                                Search Type
                            </label>

                            <select
                                id="typeInput"
                                class="w-full p-3 rounded-xl border"
                            >
                                <option value="both">Both</option>
                                <option value="jobs">Jobs</option>
                                <option value="gigs">Gigs</option>
                            </select>

                        </div>

                        <button
                            id="searchBtn"
                            class="w-full bg-pink-500 text-white py-4 rounded-xl text-lg font-semibold hover:scale-[1.02] transition"
                        >
                            🌸 Find Opportunities
                        </button>

                    </div>

                    <!-- Loading -->
                    <div
                        id="loading"
                        class="hidden mt-6 glass rounded-3xl p-6 text-center"
                    >
                        <div class="text-4xl mb-2">🌸</div>
                        Searching opportunities...
                    </div>

                    <!-- Stats -->
                    <div
                        id="stats"
                        class="hidden mt-6 grid md:grid-cols-3 gap-4"
                    >

                        <div class="glass rounded-2xl p-4 text-center">
                            <div
                                id="jobsFound"
                                class="text-3xl font-bold"
                            >
                                0
                            </div>

                            <div>Results</div>
                        </div>

                        <div class="glass rounded-2xl p-4 text-center">
                            <div
                                id="bestMatch"
                                class="text-3xl font-bold"
                            >
                                0%
                            </div>

                            <div>Best Match</div>
                        </div>

                        <div class="glass rounded-2xl p-4 text-center">
                            <div
                                id="skillsCount"
                                class="text-3xl font-bold"
                            >
                                0
                            </div>

                            <div>Skills</div>
                        </div>

                    </div>

                    <!-- Results -->
                    <div
                        id="resultsContainer"
                        class="mt-6 space-y-6"
                    ></div>

                </section>

            </div>

        </main>

    </div>

    <!-- Job Card Template -->
    <template id="jobCardTemplate">

        <div class="glass rounded-3xl p-6 result-card">

            <div class="flex justify-between gap-4 flex-wrap">

                <div>

                    <h3 class="text-2xl font-bold job-title"></h3>

                    <p class="job-company text-gray-700"></p>

                </div>

                <div class="text-right">

                    <div
                        class="job-score text-2xl font-bold text-pink-600"
                    ></div>

                    <div
                        class="job-location text-sm text-gray-600"
                    ></div>

                </div>

            </div>

            <div class="mt-4">

                <div class="font-semibold mb-2">
                    Matched Skills
                </div>

                <div
                    class="matched-skills flex flex-wrap gap-2"
                ></div>

            </div>

            <div class="mt-4">

                <div class="font-semibold mb-2">
                    Missing Skills
                </div>

                <div
                    class="missing-skills flex flex-wrap gap-2"
                ></div>

            </div>

            <div class="mt-5 flex gap-3 flex-wrap">

                <a
                    class="apply-btn bg-pink-500 text-white px-5 py-2 rounded-xl"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Apply
                </a>

                <button
                    class="favorite-btn bg-white/70 px-5 py-2 rounded-xl"
                >
                    ⭐ Favorite
                </button>

            </div>

        </div>

    </template>

    <script src="./app.js"></script>

</body>
</html>
